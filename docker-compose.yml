# APKScan single-host MVP stack (ARCHITECTURE.md "Standalone MVP layout").
# All services are local; there is NO outbound dependency on any commercial API.
# Copy .env.example -> .env before `docker compose up`.
#
# GPU: the `ollama` service requests an NVIDIA GPU. On a host without the NVIDIA
# Container Toolkit, comment out the `deploy:` block to run CPU-only inference.

name: apkscan

x-app-env: &app-env
  env_file: [.env]

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apkscan
      POSTGRES_PASSWORD: apkscan
      POSTGRES_DB: apkscan
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apkscan"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # MobSF: baseline scanner + REST backbone. Keep patched >= 4.4.6 (the runtime
  # client also enforces this minimum). Pin MOBSF_IMAGE in .env to a fixed tag
  # for reproducible deployments.
  mobsf:
    image: ${MOBSF_IMAGE:-opensecurity/mobile-security-framework-mobsf:latest}
    environment:
      MOBSF_API_KEY: ${APKSCAN_MOBSF_API_KEY:-}
    volumes:
      - mobsf_data:/home/mobsf/.MobSF
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/login/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Local LLM inference. Models are pulled into the ollama_data volume:
  #   docker compose exec ollama ollama pull qwen2.5-coder:7b-instruct-q4_K_M
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    <<: *app-env
    command: ["uvicorn", "apkscan.api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - apk_storage:/var/lib/apkscan/storage
    ports:
      - "8080:8080"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    <<: *app-env
    command: ["celery", "-A", "apkscan.jobs.celery_app:celery_app", "worker", "-Q", "urgent,default", "--loglevel=INFO", "--concurrency=2"]
    volumes:
      - apk_storage:/var/lib/apkscan/storage
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      mobsf: {condition: service_started}
      ollama: {condition: service_started}
    restart: unless-stopped

  # Optional S3-compatible object storage. Enable with: --profile s3
  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${APKSCAN_S3_ACCESS_KEY:-apkscan}
      MINIO_ROOT_PASSWORD: ${APKSCAN_S3_SECRET_KEY:-apkscan-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  mobsf_data:
  ollama_data:
  apk_storage:
  minio_data:
